<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Health Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    padding: 20px;
}
.dashboard {
    max-width: 1200px;
    margin: 0 auto;
}
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
}
h1 {
    font-size: 1.8rem;
    color: #f0f0f0;
}
.range-selector button {
    background: #16213e;
    border: 1px solid #0f3460;
    color: #e0e0e0;
    padding: 8px 16px;
    margin-left: 5px;
    cursor: pointer;
    border-radius: 4px;
    font-size: 0.9rem;
}
.range-selector button.active {
    background: #e94560;
    border-color: #e94560;
}
.status-section {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 20px;
    margin-bottom: 20px;
}
.status-indicator {
    background: #16213e;
    border-radius: 8px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
}
.status-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: gray;
}
.status-text {
    font-size: 1.2rem;
    font-weight: bold;
}
.summary-stats {
    background: #16213e;
    border-radius: 8px;
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
}
.stat-item {
    text-align: center;
}
.stat-value {
    font-size: 1.4rem;
    font-weight: bold;
    color: #e94560;
}
.stat-label {
    font-size: 0.8rem;
    color: #aaa;
}
.charts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
}
.chart-container {
    background: #16213e;
    border-radius: 8px;
    padding: 15px;
}
.chart-container h2 {
    margin-bottom: 10px;
    font-size: 1.1rem;
}
.outage-log {
    background: #16213e;
    border-radius: 8px;
    padding: 15px;
}
.outage-log table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}
.outage-log th, .outage-log td {
    text-align: left;
    padding: 8px;
    border-bottom: 1px solid #0f3460;
}
@media (max-width: 768px) {
    .charts {
        grid-template-columns: 1fr;
    }
    .status-section {
        grid-template-columns: 1fr;
    }
    header {
        flex-direction: column;
        align-items: flex-start;
    }
    .range-selector {
        margin-top: 10px;
    }
}
    </style>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Network Health Monitor</h1>
            <div class="range-selector">
                <button data-range="1h" class="active">1h</button>
                <button data-range="24h">24h</button>
                <button data-range="7d">7d</button>
                <button data-range="30d">30d</button>
            </div>
        </header>

        <section class="status-section">
            <div class="status-indicator">
                <span class="status-dot" id="status-dot"></span>
                <span class="status-text" id="status-text">Checking...</span>
            </div>
            <div class="summary-stats" id="summary-stats">
                <!-- filled by JS -->
            </div>
        </section>

        <section class="charts">
            <div class="chart-container">
                <h2>Latency</h2>
                <canvas id="latencyChart"></canvas>
            </div>
            <div class="chart-container">
                <h2>Packet Loss (%)</h2>
                <canvas id="packetLossChart"></canvas>
            </div>
        </section>

        <section class="outage-log">
            <h2>Recent Outages</h2>
            <table id="outages-table">
                <thead>
                    <tr><th>Start</th><th>End</th><th>Duration</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </div>

    <script>
        // Global chart instances to update later
let latencyChart = null;
let packetLossChart = null;
let currentRange = '1h';

// Fetch and update dashboard
async function fetchData(range) {
    try {
        const [statusRes, historyRes] = await Promise.all([
            fetch('/api/status'),
            fetch(`/api/history?range=${range}`)
        ]);
        const status = await statusRes.json();
        const history = await historyRes.json();

        updateStatus(status);
        updateSummary(history);
        updateCharts(history);
        updateOutageTable(history.outages);
    } catch (error) {
        console.error('Error fetching data:', error);
        document.getElementById('status-text').textContent = 'Error';
    }
}

function updateStatus(status) {
    const dot = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    const color = status.current_status;
    dot.style.background = color;
    if (status.outage_active) {
        text.textContent = 'Outage Active';
    } else if (status.latest_ping && status.latest_ping.success) {
        text.textContent = `Online (${status.latest_ping.latency_ms.toFixed(1)}ms)`;
    } else {
        text.textContent = 'No Data';
    }
}

function updateSummary(history) {
    const container = document.getElementById('summary-stats');
    if (!history.pings || history.pings.length === 0) {
        container.innerHTML = '<div class="stat-item">No data available</div>';
        return;
    }

    // Calculate summary stats from the ping data
    let successfulPings = history.pings.filter(p => p.success || p.avg_latency !== null);
    let totalPings = history.pings.length;
    let avgLatency = 0;
    let maxLatency = 0;
    let totalLoss = 0;

    if (history.pings[0].avg_latency !== undefined) {
        // Aggregated data (24h, 7d, 30d)
        let sumWeighted = 0;
        let totalSamples = 0;
        let maxAvg = 0;
        let totalSamplesFailed = 0;
        let totalSamplesAll = 0;

        history.pings.forEach(bucket => {
            if (bucket.avg_latency !== null) {
                sumWeighted += bucket.avg_latency * bucket.sample_count;
                totalSamples += bucket.sample_count;
                if (bucket.avg_latency > maxAvg) maxAvg = bucket.avg_latency;
            }
            totalSamplesAll += bucket.sample_count;
            totalSamplesFailed += (bucket.packet_loss / 100) * bucket.sample_count;
        });
        avgLatency = totalSamples > 0 ? sumWeighted / totalSamples : 0;
        maxLatency = maxAvg;
        totalLoss = totalSamplesAll > 0 ? (totalSamplesFailed / totalSamplesAll) * 100 : 0;
    } else {
        // Raw data (1h)
        let sum = 0, count = 0, max = 0, failed = 0;
        history.pings.forEach(p => {
            if (p.success) {
                sum += p.latency_ms;
                count++;
                if (p.latency_ms > max) max = p.latency_ms;
            } else {
                failed++;
            }
        });
        avgLatency = count > 0 ? sum / count : 0;
        maxLatency = max;
        totalLoss = (failed / totalPings) * 100;
    }

    const uptime = history.outages.length > 0 ? calculateUptime(history.outages, history.range) : 100;

    container.innerHTML = `
        <div class="stat-item"><div class="stat-value">${avgLatency.toFixed(1)}</div><div class="stat-label">Avg Latency (ms)</div></div>
        <div class="stat-item"><div class="stat-value">${maxLatency.toFixed(1)}</div><div class="stat-label">Max Latency (ms)</div></div>
        <div class="stat-item"><div class="stat-value">${totalLoss.toFixed(2)}%</div><div class="stat-label">Packet Loss</div></div>
        <div class="stat-item"><div class="stat-value">${history.outages.length}</div><div class="stat-label">Outages</div></div>
        <div class="stat-item"><div class="stat-value">${uptime.toFixed(1)}%</div><div class="stat-label">Uptime</div></div>
    `;
}

function calculateUptime(outages, range) {
    // simplistic: total outage duration / total time range
    // Convert range to hours
    const rangeMap = {'1h': 1, '24h': 24, '7d': 168, '30d': 720};
    const totalHours = rangeMap[range] || 1;
    let totalOutageMs = 0;
    outages.forEach(o => {
        const start = new Date(o.start_time);
        const end = o.end_time ? new Date(o.end_time) : new Date();
        totalOutageMs += end - start;
    });
    const outageHours = totalOutageMs / 3600000;
    return ((totalHours - outageHours) / totalHours) * 100;
}

function updateCharts(history) {
    if (!history.pings || history.pings.length === 0) return;

    // Prepare data arrays
    let labels, latencyData, lossData;

    if (history.pings[0].avg_latency !== undefined) {
        // Aggregated
        labels = history.pings.map(b => b.time_bucket);
        latencyData = history.pings.map(b => b.avg_latency);
        lossData = history.pings.map(b => b.packet_loss);
    } else {
        // Raw
        labels = history.pings.map(p => p.timestamp);
        latencyData = history.pings.map(p => p.success ? p.latency_ms : null); // null breaks line, good for gaps
        lossData = history.pings.map(p => p.success ? 0 : 100); // 0% or 100% per ping
    }

    // Destroy existing charts to redraw
    if (latencyChart) latencyChart.destroy();
    if (packetLossChart) packetLossChart.destroy();

    const latencyCtx = document.getElementById('latencyChart').getContext('2d');
    latencyChart = new Chart(latencyCtx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Latency (ms)',
                data: latencyData,
                borderColor: '#e94560',
                backgroundColor: 'rgba(233, 69, 96, 0.1)',
                fill: true,
                tension: 0.1,
                spanGaps: false
            }]
        },
        options: {
            responsive: true,
            scales: {
                x: { display: true, ticks: { color: '#aaa' } },
                y: { beginAtZero: true, ticks: { color: '#aaa' } }
            },
            plugins: { legend: { labels: { color: '#e0e0e0' } } }
        }
    });

    const lossCtx = document.getElementById('packetLossChart').getContext('2d');
    packetLossChart = new Chart(lossCtx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Packet Loss (%)',
                data: lossData,
                backgroundColor: '#e94560',
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            scales: {
                x: { display: true, ticks: { color: '#aaa' } },
                y: { beginAtZero: true, max: 100, ticks: { color: '#aaa' } }
            },
            plugins: { legend: { labels: { color: '#e0e0e0' } } }
        }
    });
}

function updateOutageTable(outages) {
    const tbody = document.querySelector('#outages-table tbody');
    if (!outages || outages.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3">No outages in selected range.</td></tr>';
        return;
    }
    let html = '';
    outages.forEach(o => {
        const start = new Date(o.start_time).toLocaleString();
        const end = o.end_time ? new Date(o.end_time).toLocaleString() : 'Ongoing';
        let duration = 'N/A';
        if (o.end_time) {
            const durMs = new Date(o.end_time) - new Date(o.start_time);
            const mins = Math.floor(durMs / 60000);
            const secs = Math.floor((durMs % 60000) / 1000);
            duration = `${mins}m ${secs}s`;
        }
        html += `<tr><td>${start}</td><td>${end}</td><td>${duration}</td></tr>`;
    });
    tbody.innerHTML = html;
}

// Range switcher
document.querySelectorAll('.range-selector button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelector('.range-selector button.active').classList.remove('active');
        btn.classList.add('active');
        currentRange = btn.dataset.range;
        fetchData(currentRange);
    });
});

// Initial fetch
fetchData('1h');

// Auto-refresh status every 30s (re-fetches history too, keeping charts updated)
setInterval(() => {
    fetchData(currentRange);
}, 30000);
    </script>
</body>
</html>
